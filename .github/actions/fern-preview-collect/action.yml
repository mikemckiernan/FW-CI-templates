name: fern-preview-collect
description: >
  Collects Fern sources and PR metadata for the two-stage preview workflow.
  Uploads the fern directory and .preview-metadata/ as a single artifact for
  the companion fern-preview-comment stage to consume.
  No secrets required — safe to run on fork PRs via the pull_request trigger.

inputs:
  fern-directory:
    description: Directory containing the fern configuration (relative to repo root)
    required: false
    default: 'fern'
  artifact-name:
    description: >
      Name of the uploaded artifact. Must match the artifact-name used in the
      companion fern-preview-comment stage.
    required: false
    default: 'fern-preview'
  artifact-retention-days:
    description: Days to retain the artifact
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Get changed MDX files
      id: changed
      uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
      with:
        files: '**/*.mdx'

    - name: Save PR metadata
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_REF: ${{ github.head_ref }}
        CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
      run: |
        mkdir -p .preview-metadata
        echo "$PR_NUMBER" > .preview-metadata/pr_number
        echo "$HEAD_REF" > .preview-metadata/head_ref
        echo "$CHANGED_FILES" | tr ' ' '\n' | grep -v '^$' > .preview-metadata/changed_mdx_files

    - name: Upload fern sources and metadata
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.fern-directory }}/
          .preview-metadata/
        retention-days: ${{ inputs.artifact-retention-days }}
