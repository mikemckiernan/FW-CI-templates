name: fern-generate-library-reference
description: >
  Runs `fern docs md generate` to produce library reference MDX from Python source.
  The output is written under the fern directory.
  Call this before any publish or preview step in repos that use Fern library reference docs.

inputs:
  token:
    description: Specify the secret or environment variable that has the Fern token.
    required: true
  fern-directory:
    description: Directory containing the fern configuration (relative to repo root)
    required: false
    default: 'fern'

runs:
  using: composite
  steps:
    - name: Generate library reference MDX
      shell: bash
      working-directory: ${{ inputs.fern-directory }}
      env:
        FERN_TOKEN: ${{ inputs.token }}
      run: fern docs md generate
