name: fern-install-cli
description: >
  Installs Node.js and the Fern CLI.
  Call this as the first step in any job that runs fern commands.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: 'lts/*'
  fern-version:
    description: >
      Fern CLI version to install (semver, e.g. "0.60.3"). Defaults to "latest".
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Fern CLI
      uses: fern-api/setup-fern-cli@d07601425e9c9ede8745d71ca75c4c462d98755d # v1.0.0
      with:
        version: ${{ inputs.fern-version }}
